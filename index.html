<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Planner Pro v2.9</title>
<style>
:root { --bg-color: #f5f5f7; --card-color: #ffffff; --text-main: #1d1d1f; --text-sub: #86868b; --accent: #0071e3; --border: #d2d2d7; --radius-m: 12px; --radius-l: 18px; --shadow: 0 8px 24px rgba(0, 0, 0, 0.08); }
*{box-sizing:border-box;margin:0;padding:0;outline:none;}
body{font-family:'Pretendard', system-ui, sans-serif;background:var(--bg-color);color:var(--text-main);-webkit-font-smoothing:antialiased;}
.app{max-width:960px;margin:0 auto;padding:1.5rem;}
.app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.sync-status{font-size:12px;display:flex;align-items:center;gap:6px;background:#fff;padding:6px 12px;border-radius:20px;box-shadow:var(--shadow); cursor:pointer;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#28a745;}
.sync-dot.saving{background:#ffc107;animation:pulse .8s infinite;}
.sync-dot.error{background:#ff3b30;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.tabs{display:flex;gap:4px;margin-bottom:1.5rem;background:#e3e3e6;padding:4px;border-radius:var(--radius-m);}
.tab{flex:1;padding:12px;border-radius:10px;border:none;background:transparent;cursor:pointer;font-size:15px;color:var(--text-sub);font-weight:600;}
.tab.on{background:var(--card-color);color:var(--text-main);box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);}
.view{display:none;}.view.on{display:block;}
.cal-container{background:var(--card-color);border-radius:var(--radius-l);padding:15px;box-shadow:var(--shadow);margin-bottom:1.5rem; overflow-x: auto;}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;font-size:18px;font-weight:700;padding:0 10px;}
.cgrid{display:grid;grid-template-columns:repeat(7, minmax(0, 1fr)); gap:4px; min-width: 700px;}
.dlbl{text-align:center;font-size:12px;color:var(--text-sub);padding-bottom:10px;font-weight:600;}
.dlbl:first-child { color: #ff3b30; } 
.dlbl:last-child { color: #0071e3; }
.cell{border-radius:8px;background:#fbfbfd;cursor:pointer;min-height:100px;border:1px solid #f0f0f2;transition:0.2s;display:flex;flex-direction:column;position:relative;}
.cell.sel-day{background:#fff;border-color:var(--accent);box-shadow: 0 0 0 2px var(--accent) inset;}
.cnum{padding:6px 8px;font-size:13px;color:var(--text-sub);font-weight:500;}
.cline{font-size:10px;padding:3px 6px;margin:1px 3px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:grab;font-weight:500;}
.day-panel{background:var(--card-color);border-radius:var(--radius-l);padding:24px;box-shadow:var(--shadow);border:1px solid var(--border);}
.ti{width:100%;padding:14px;border-radius:var(--radius-m);border:1px solid var(--border);font-size:15px;background:#f9f9fb;}
.opt-bar{display:flex;gap:10px;align-items:center;margin-top:10px;margin-bottom:20px;padding-bottom:15px;border-bottom:1px solid #eee;flex-wrap:wrap;}
.titem{display:flex;align-items:center;gap:12px;padding:16px;background:#fff;border-radius:var(--radius-m);margin-bottom:10px;border:1px solid #f0f0f2;}
.chk{width:22px;height:22px;border-radius:50%;border:2px solid;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:0.2s; color: transparent;}
.chk.done{color:white !important; border-color:transparent !important;}
.editor-wrap{background:#fff; border-radius:var(--radius-l); box-shadow:var(--shadow); overflow:hidden; margin-bottom:20px;}
.toolbar{display:flex; flex-wrap:wrap; gap:5px; padding:10px; background:#f5f5f7; border-bottom:1px solid var(--border);}
.toolbar button, .toolbar select{padding:6px 10px; border-radius:6px; border:1px solid #ddd; background:#fff; cursor:pointer; font-size:13px;}
.editor-content{min-height:350px; padding:25px; outline:none; font-size:16px; line-height:1.6; background:white;}
.memo-card{background:#fff; padding:20px; border-radius:15px; margin-bottom:15px; box-shadow:var(--shadow); border:1px solid #eee; position:relative;}
.memo-actions{position:absolute; top:15px; right:15px; display:flex; gap:8px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:2000;visibility:hidden;opacity:0;transition:0.3s;backdrop-filter:blur(4px);}
.overlay.on{visibility:visible;opacity:1;}
.modal{background:#fff;padding:25px;border-radius:var(--radius-l);width:90%;max-width:450px;max-height:90vh;overflow-y:auto;}
.btn{padding:10px 18px; border-radius:10px; border:1px solid var(--border); background:#fff; cursor:pointer; font-weight:600;}
.btn.primary{background:var(--accent); color:#fff; border-color:var(--accent);}
.btn.danger{color:#ff3b30; border-color:#ff3b30;}
.pal-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;}
.dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.dot.on{border-color:#1d1d1f;transform:scale(1.2);}
</style>
</head>
<body>

<div class="app">
  <div class="app-header">
    <h1>Planner Pro v2.9</h1>
    <div class="sync-status" onclick="init()" title="강제 동기화">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label">동기화됨</span>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab on" data-tab="cal">달력 & 일정</button>
    <button class="tab" data-tab="memo">프리미엄 메모</button>
  </div>

  <div id="v-cal" class="view on">
    <div class="cal-container">
      <div class="cal-hdr"><button class="btn" onclick="moveMonth(-1)">◀</button><span id="cal-title"></span><button class="btn" onclick="moveMonth(1)">▶</button></div>
      <div class="cgrid" id="cgrid"></div>
    </div>
    <div class="day-panel">
      <h3 id="panel-date" style="margin-bottom:15px;">날짜</h3>
      <div style="display:flex; gap:10px;"><input class="ti" id="t-inp" placeholder="할 일을 입력하세요..."/><button class="btn primary" id="t-add">추가</button></div>
      <div class="opt-bar">
        <select class="btn" id="t-repeat">
          <option value="none">반복 안함</option><option value="daily">매일</option><option value="weekday">평일</option><option value="weekend">주말</option><option value="weekly">매주</option><option value="monthly">매월</option>
        </select>
        <select class="btn" id="t-priority"><option value="0">보통</option><option value="1">⭐ 중요</option></select>
        <div class="pal-grid" id="main-pal" style="margin-left:auto;"></div>
      </div>
      <div id="day-todo-list"></div>
    </div>
  </div>

  <div id="v-memo" class="view">
    <div class="editor-wrap">
      <div class="toolbar">
        <button onclick="exec('bold')">B</button><button onclick="exec('italic')">I</button><button onclick="exec('underline')">U</button>
        <select onchange="exec('formatBlock', this.value); this.selectedIndex=0;"><option value="">스타일</option><option value="H1">제목1</option><option value="P">본문</option></select>
        <select onchange="exec('foreColor', this.value); this.selectedIndex=0;"><option value="">색상</option><option value="#ff3b30">빨강</option><option value="#0071e3">파랑</option><option value="#000000">검정</option></select>
        <button onclick="g('img-file').click()">📷 이미지</button>
        <input type="file" id="img-file" hidden accept="image/*" onchange="handleImg(this)"/>
      </div>
      <input class="ti" id="m-title" placeholder="제목" style="border:none; border-bottom:1px solid #eee; border-radius:0; font-size:22px; font-weight:800; padding:20px 30px; width:100%;"/>
      <div id="m-editor" class="editor-content" contenteditable="true"></div>
      <div style="padding:15px; background:#f9f9fb; text-align:right;">
        <span id="edit-indicator" style="display:none; color:var(--accent); font-size:13px; margin-right:10px;">수정 중...</span>
        <button class="btn primary" id="m-save">메모 저장</button>
      </div>
    </div>
    <div id="memo-list"></div>
  </div>
</div>

<div id="edit-modal" class="overlay">
  <div class="modal">
    <h3>일정 상세 수정</h3>
    <input class="ti" id="edit-ti" style="margin:15px 0;"/>
    <div style="display:flex; gap:10px; margin-bottom:15px;">
        <input type="date" class="ti" id="edit-date" style="flex:1;"/>
        <select class="ti" id="edit-repeat" style="flex:1;">
            <option value="none">안함</option><option value="daily">매일</option><option value="weekday">평일</option><option value="weekend">주말</option><option value="weekly">매주</option><option value="monthly">매월</option>
        </select>
    </div>
    <div style="margin-bottom:15px;">
        <select class="ti" id="edit-priority">
            <option value="0">중요도: 보통</option>
            <option value="1">중요도: ⭐ 중요</option>
        </select>
    </div>
    <div class="pal-grid" id="edit-pal" style="margin-bottom:20px;"></div>
    <div style="display:flex; justify-content:flex-end; gap:8px;">
      <button class="btn" onclick="closeEditModal()">취소</button>
      <button class="btn primary" id="edit-submit-btn" onclick="submitEdit()">수정 완료</button>
    </div>
  </div>
</div>

<script>
const SB_URL='https://aphyujajnsbngzsutnwz.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwaHl1amFqbnNibmd6c3V0bnd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNzQ0ODMsImV4cCI6MjA5MTc1MDQ4M30.6p57obf652MoMjIlfdGZ8m7qeI6_deu38U-2clG8JR4';
const HEADERS={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
const COLS=['#ff3b30','#ff9500','#ffcc00','#34c759','#0071e3','#5ac8fa','#af52de','#ff2d55','#1d1d1f','#8e8e93','#c7c7cc','#5856d6','#ff375f','#32ade6','#66d4cf','#4cd964','#8b4513','#008080','#e91e63','#4b0082'];

let todos=[], memos=[], selCol=COLS[4], editCol='', calY=new Date().getFullYear(), calM=new Date().getMonth(), selDay=new Date().toISOString().split('T')[0], curEditId=null, curMemoEditId=null, pendingDelId=null;
const g=id=>document.getElementById(id);

async function init(){
  g('sync-dot').className = 'sync-dot saving';
  g('sync-label').textContent = '불러오는 중...';
  try {
    const tr=await fetch(`${SB_URL}/rest/v1/todos?select=*`,{headers:HEADERS});
    const todoData = await tr.json();
    todos=todoData.map(r=>r.data).filter(t => !t.text.includes("무매 TQQQ"));

    const mr=await fetch(`${SB_URL}/rest/v1/memos?select=*`,{headers:HEADERS});
    const memoData = await mr.json();
    memos=memoData.map(r=>r.data);

    buildPal('main-pal', true); renderCal(); renderDayList(); renderMemos();
    g('sync-dot').className = 'sync-dot';
    g('sync-label').textContent = '동기화됨';
  } catch(e) {
    g('sync-dot').className = 'sync-dot error';
    g('sync-label').textContent = '연결 오류';
  }
}

// 저장 로직 강화: 모든 데이터 변경 시 이 함수가 끝날 때까지 대기
async function saveT(){
  const dot = g('sync-dot');
  const label = g('sync-label');
  dot.className = 'sync-dot saving';
  label.textContent = '저장 중...';

  try {
    const ups = todos.map((t, idx) => ({ id: t.id, data: { ...t, order: idx }, updated_at: new Date().toISOString() }));
    const response = await fetch(`${SB_URL}/rest/v1/todos`, {
      method: 'POST',
      headers: { ...HEADERS, 'Prefer': 'resolution=merge-duplicates' },
      body: JSON.stringify(ups)
    });
    if (!response.ok) throw new Error('Save failed');
    dot.className = 'sync-dot';
    label.textContent = '동기화됨';
    return true;
  } catch (error) {
    dot.className = 'sync-dot error';
    label.textContent = '저장 실패';
    return false;
  }
}

function buildPal(target, isMain){
  const row=g(target); row.innerHTML='';
  COLS.forEach(c=>{
    const d=document.createElement('div');
    d.className='dot'+((isMain?selCol:editCol)===c?' on':''); d.style.background=c;
    d.onclick=()=>{if(isMain)selCol=c; else editCol=c; buildPal(target, isMain);};
    row.appendChild(d);
  });
}

function isVisible(t, ds){
  if(t.exDates && t.exDates.includes(ds)) return false;
  const target=new Date(ds), origin=new Date(t.date); if(target < origin) return false;
  if(t.date === ds) return true;
  if(!t.repeat || t.repeat === 'none') return false;
  const day = target.getDay();
  if(t.repeat === 'daily') return true;
  if(t.repeat === 'weekday') return day >= 1 && day <= 5;
  if(t.repeat === 'weekend') return day === 0 || day === 6;
  if(t.repeat === 'weekly') return day === origin.getDay();
  if(t.repeat === 'monthly') return target.getDate() === origin.getDate();
  return false;
}

function renderCal(){
  const grid=g('cgrid'); grid.innerHTML='일월화수목금토'.split('').map(d=>`<div class="dlbl">${d}</div>`).join('');
  g('cal-title').textContent=`${calY}년 ${calM+1}월`;
  const first=new Date(calY,calM,1).getDay(), last=new Date(calY,calM+1,0).getDate();
  for(let i=0;i<first;i++) grid.appendChild(document.createElement('div'));
  for(let i=1; i<=last; i++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    const cell=document.createElement('div'); cell.className='cell'+(ds===selDay?' sel-day':'');
    cell.dataset.date=ds; cell.innerHTML=`<div class="cnum">${i}</div>`;
    todos.filter(t=>isVisible(t,ds)).sort((a,b)=>a.order-b.order).slice(0,3).forEach(t=>{
      const l=document.createElement('div'); l.className='cline'; l.draggable=true;
      l.style=`color:${t.col}; background:${t.col}15; ${t.done?'text-decoration:line-through;opacity:0.5':''}`;
      l.textContent=(t.priority==='1'?'⭐':'')+t.text;
      l.onmousedown = (e) => { l.dataset.isCtrl = e.ctrlKey; };
      l.ondragstart = (e) => { e.dataTransfer.setData('tid', t.id); e.dataTransfer.setData('isCtrl', l.dataset.isCtrl); };
      cell.appendChild(l);
    });
    cell.ondragover=e=>e.preventDefault();
    cell.ondrop=async e=>{
        e.preventDefault();
        const tid=parseInt(e.dataTransfer.getData('tid'));
        const isCtrl=e.dataTransfer.getData('isCtrl')==='true';
        const t=todos.find(x=>x.id===tid);
        if(t){
            if(isCtrl){ todos.push({...t, id:Date.now(), date:cell.dataset.date, order:todos.length, exDates:[]}); }
            else { t.date=cell.dataset.date; if(t.exDates) t.exDates=[]; }
            await saveT(); renderCal(); renderDayList();
        }
    };
    cell.onclick=()=>{selDay=ds; renderCal(); renderDayList();};
    grid.appendChild(cell);
  }
}

function renderDayList(){
  g('panel-date').textContent=`📅 ${selDay} 일정`;
  const list=g('day-todo-list'); list.innerHTML='';
  todos.filter(t=>isVisible(t, selDay)).sort((a,b)=>a.order-b.order).forEach(t=>{
    const item=document.createElement('div'); item.className='titem';
    item.innerHTML=`
      <div style="display:flex; flex-direction:column; gap:2px;"><button class="btn" style="padding:2px 6px; font-size:10px;" onclick="moveOrder(${t.id},'up')">▲</button><button class="btn" style="padding:2px 6px; font-size:10px;" onclick="moveOrder(${t.id},'down')">▼</button></div>
      <div class="chk ${t.done?'done':''}" style="border-color:${t.col}; background:${t.done?t.col:'transparent'}" onclick="toggleT(${t.id})">✔</div>
      <div style="flex:1; font-size:15px; ${t.done?'text-decoration:line-through;color:#aaa':''}">${t.text} ${t.repeat!=='none'?'<small style="color:#0071e3">['+t.repeat+']</small>':''}</div>
      <button class="btn" style="padding:6px 10px; font-size:12px;" onclick="openEdit(${t.id})">수정</button>
      <button class="btn" style="padding:6px 10px; font-size:12px; color:#ff3b30;" onclick="handleDelete(${t.id})">삭제</button>
    `;
    list.appendChild(item);
  });
}

async function handleDelete(id){
    const t = todos.find(x=>x.id===id);
    if(t.repeat && t.repeat !== 'none'){ pendingDelId = id; g('del-confirm-modal').classList.add('on'); }
    else { if(confirm('삭제하시겠습니까?')){ todos=todos.filter(x=>x.id!==id); await saveT(); renderCal(); renderDayList(); } }
}

async function executeDelete(type){
    const t = todos.find(x=>x.id===pendingDelId);
    if(!t) return;
    if(type === 'all'){ todos = todos.filter(x=>x.id!==pendingDelId); }
    else { if(!t.exDates) t.exDates = []; t.exDates.push(selDay); }
    g('del-confirm-modal').classList.remove('on'); 
    await saveT(); renderCal(); renderDayList();
}

async function toggleT(id){ 
  const t=todos.find(x=>x.id===id); 
  t.done=!t.done; 
  await saveT(); 
  renderCal(); 
  renderDayList(); 
}

// 메모 저장 로직도 비동기 대기 추가
g('m-save').onclick=async()=>{
  const title = g('m-title').value; const content = g('m-editor').innerHTML; if(!title) return;
  if(curMemoEditId){
    const m = memos.find(x=>x.id===curMemoEditId); m.title = title; m.content = content; curMemoEditId = null; g('edit-indicator').style.display='none';
  } else { memos.push({id:Date.now(), title, content, ts:new Date().toLocaleString()}); }
  
  g('sync-dot').className = 'sync-dot saving';
  const res = await fetch(`${SB_URL}/rest/v1/memos`,{method:'POST',headers:{...HEADERS,'Prefer':'resolution=merge-duplicates'},body:JSON.stringify(memos.map(m=>({id:m.id, data:m}))) });
  if(res.ok) {
    g('sync-dot').className = 'sync-dot';
    renderMemos(); g('m-title').value=''; g('m-editor').innerHTML='';
  }
};

function openEdit(id){ 
    const t=todos.find(x=>x.id===id); curEditId=id; editCol=t.col; 
    g('edit-ti').value=t.text; g('edit-date').value=t.date; g('edit-repeat').value=t.repeat||'none'; g('edit-priority').value=t.priority || '0'; 
    buildPal('edit-pal', false); g('edit-modal').classList.add('on'); 
}

async function submitEdit(){ 
    const btn = g('edit-submit-btn');
    btn.disabled = true; btn.textContent = '저장 중...';
    
    const t=todos.find(x=>x.id===curEditId); 
    t.text=g('edit-ti').value; t.date=g('edit-date').value; t.repeat=g('edit-repeat').value; t.priority=g('edit-priority').value; t.col=editCol; 
    
    const success = await saveT();
    if(success) {
      g('edit-modal').classList.remove('on'); 
      renderCal(); renderDayList(); 
    } else {
      alert('저장에 실패했습니다. 다시 시도해 주세요.');
    }
    btn.disabled = false; btn.textContent = '수정 완료';
}

async function moveOrder(id, dir){
  const t = todos.find(x => x.id === id); const same = todos.filter(x => isVisible(x, t.date)).sort((a,b)=>a.order-b.order); const idx = same.findIndex(x => x.id === id);
  if(dir==='up' && idx>0){ [same[idx].order, same[idx-1].order] = [same[idx-1].order, same[idx].order]; }
  else if(dir==='down' && idx<same.length-1){ [same[idx].order, same[idx+1].order] = [same[idx+1].order, same[idx].order]; }
  await saveT(); renderDayList();
}

g('t-add').onclick=async()=>{
  const val=g('t-inp').value.trim(); if(!val) return;
  todos.push({id:Date.now(), text:val, date:selDay, col:selCol, done:false, priority:g('t-priority').value, repeat:g('t-repeat').value, order:todos.length, exDates:[]});
  const success = await saveT();
  if(success) { g('t-inp').value=''; renderCal(); renderDayList(); }
};

// ... (나머지 헬퍼 함수들은 동일)
function closeEditModal(){ g('edit-modal').classList.remove('on'); }
function exec(cmd, val=null){ document.execCommand(cmd, false, val); g('m-editor').focus(); }
function handleImg(input){ if(input.files && input.files[0]){ const reader=new FileReader(); reader.onload=e=>document.execCommand('insertImage', false, e.target.result); reader.readAsDataURL(input.files[0]); } }
function renderMemos(){ g('memo-list').innerHTML=memos.sort((a,b)=>b.id-a.id).map(m=>`<div class="memo-card"><div class="memo-actions"><button class="btn" onclick="editMemo(${m.id})">편집</button><button class="btn" style="color:red;" onclick="delMemo(${m.id})">삭제</button></div><h4>${m.title}</h4><div style="font-size:14px; margin-top:10px;">${m.content}</div></div>`).join(''); }
function editMemo(id){ const m = memos.find(x=>x.id===id); g('m-title').value = m.title; g('m-editor').innerHTML = m.content; curMemoEditId = id; g('edit-indicator').style.display='inline'; window.scrollTo({top:0, behavior:'smooth'}); }
async function delMemo(id){ if(confirm('삭제?')){memos=memos.filter(x=>x.id!==id); renderMemos(); await fetch(`${SB_URL}/rest/v1/memos?id=eq.${id}`,{method:'DELETE',headers:HEADERS});}}
function moveMonth(v){ calM+=v; if(calM<0){calM=11;calY--;} if(calM>11){calM=0;calY++;} renderCal(); }
g('tabs').onclick=e=>{ const t=e.target.dataset.tab; if(!t)return; document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===t)); document.querySelectorAll('.view').forEach(v=>v.classList.toggle('on',v.id==='v-'+t));};

init();
</script>
</body>
